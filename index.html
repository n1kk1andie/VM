function Spark({ m, target, color, h = 56 }) {
  const W = 250, H = 56, pad = 6, n = m.length;
  const present = m.filter(v => typeof v === "number");
  if (!present.length) return null;
  const lo = Math.min(...present, target) - 0.02, hi = Math.max(...present, target) + 0.02;
  const x = i => pad + i * (W - 2 * pad) / Math.max(n - 1, 1);
  const y = v => H - pad - (v - lo) / (hi - lo) * (H - 2 * pad);
  let path = "", started = false;
  m.forEach((v, i) => { if (typeof v !== "number") { started = false; return; }
    path += (started ? " L" : " M") + x(i).toFixed(1) + " " + y(v).toFixed(1); started = true; });
  return (
    <svg viewBox={"0 0 " + W + " " + H} preserveAspectRatio="none" style={{ width: "100%", height: h, display: "block" }}>
      <line x1={pad} x2={W - pad} y1={y(target)} y2={y(target)} stroke="#C9C2BE" strokeWidth="1" strokeDasharray="3 4" vectorEffect="non-scaling-stroke" />
      <path d={path} fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />
    </svg>
  );
}

async function graphLoad(setStatus) {
  if (!CONFIG.clientId || !CONFIG.tenantId) throw new Error("not-configured");
  setStatus("Signing in to Microsoft 365…");
  const app = new msal.PublicClientApplication({
    auth: { clientId: CONFIG.clientId, authority: "https://login.microsoftonline.com/" + CONFIG.tenantId,
      redirectUri: window.location.origin + window.location.pathname },
    cache: { cacheLocation: "sessionStorage" },
  });
  await app.initialize();
  let account = app.getAllAccounts()[0];
  if (!account) { const res = await app.loginPopup({ scopes: ["Sites.Read.All"] }); account = res.account; }
  const tok = await app.acquireTokenSilent({ scopes: ["Sites.Read.All"], account })
    .catch(() => app.acquireTokenPopup({ scopes: ["Sites.Read.All"] }));
  const H = { Authorization: "Bearer " + tok.accessToken };
  const g = async url => { const r = await fetch("https://graph.microsoft.com/v1.0" + url, { headers: H });
    if (!r.ok) throw new Error("Graph " + r.status + " on " + url); return r.json(); };
  setStatus("Locating workbook on SharePoint…");
  const site = await g("/sites/" + CONFIG.siteHostname + ":" + CONFIG.sitePath);
  const wb = "/sites/" + site.id + "/drive/root:" + encodeURI(CONFIG.workbookPath) + ":/workbook";
  setStatus("Reading Key Processes & SLA 2026…");
  const key = await g(wb + "/worksheets('" + encodeURIComponent(CONFIG.keySheet) + "')/usedRange?$select=values");
  setStatus("Reading Historical Trend 2024-2026…");
  let hist = null;
  try { hist = await g(wb + "/worksheets('" + encodeURIComponent(CONFIG.histSheet) + "')/usedRange?$select=values"); } catch (e) {}
  return { measures: parseKeySheet(key.values), hist: hist ? parseHistSheet(hist.values) : null };
}
function parseKeySheet(rows) {
  const hi = rows.findIndex(r => r.some(c => String(c).trim() === "Key Processes"));
  if (hi < 0) throw new Error("Header row not found on key sheet");
  const head = rows[hi].map(c => String(c).trim());
  const col = label => head.findIndex(h => h.toLowerCase().startsWith(label.toLowerCase()));
  const cName = col("Key Processes"), cOwner = col("Owner"), cUnit = col("Unit"), cDesc = col("SLA Target"),
    cTarget = col("YTD SLA % Target"), cPub = col("For Publication"), cCom = col("Comments");
  const mCols = MONTHS.map((_, i) => head.findIndex(h => h.toLowerCase().startsWith(
    ["january","february","march","april","may","june","july","august","september","october","november","december"][i])));
  const num = v => { const n = parseFloat(v); return isNaN(n) ? (String(v).trim().toUpperCase() === "N/A" ? "NA" : null) : n; };
  const catOf = u => { u = String(u || "").toLowerCase();
    if (u.includes("treasury")) return "TPE";
    if (u.includes("business support")) return "BSS";
    if (u.includes("quality")) return "PEE";
    if (u.includes("account") || u.includes("continuity")) return "SRP";
    return "OTH"; };
  const out = [];
  rows.slice(hi + 1).forEach((r, i) => {
    if (String(r[cPub]).trim().toUpperCase() !== "YES") return;
    const name = String(r[cName] || "").trim(); if (!name) return;
    out.push({ id: 1000 + i, cat: catOf(r[cUnit]), name, owner: String(r[cOwner] || "").trim() || "—",
      d: cDesc >= 0 ? String(r[cDesc] || "").trim() : "",
      target: num(r[cTarget]) || .9999, m: mCols.map(ci => ci >= 0 ? num(r[ci]) : null),
      note: String(r[cCom] || "").trim() || undefined });
  });
  if (!out.length) throw new Error("No published rows found");
  return out;
}
function parseHistSheet(rows) {
  const hi = rows.findIndex(r => r.some(c => /jan-?24/i.test(String(c))));
  if (hi < 0) return null;
  const start = rows[hi].findIndex(c => /jan-?24/i.test(String(c)));
  const grab = r => { const vals = [];
    for (let c = start; c < start + 36; c++) { const n = parseFloat(r[c]); vals.push(isNaN(n) ? null : n); }
    return vals; };
  let avg = null;
  const groups = []; let cur = { g: "Workbook history", rows: [] };
  rows.slice(hi + 1).forEach(r => {
    const a = String(r[0] || ""), name = String(r[1] || "").trim();
    if (/measures/i.test(a) && !name) { if (cur.rows.length) groups.push(cur); cur = { g: a.trim(), rows: [] }; return; }
    if (/monthly actual/i.test(name)) { avg = grab(r); return; }
    if (!name || /monthly target|performance score|status key/i.test(name)) return;
    const vals = grab(r);
    if (vals.some(v => v != null)) cur.rows.push([name, 0, vals]);
  });
  if (cur.rows.length) groups.push(cur);
  return { groups: groups.length ? groups : null, avg };
}

  doc.setFontSize(8); doc.setFont(undefined, "bold"); doc.setTextColor(28, 20, 22);
  doc.text("Status key", 14, y); y += 5; doc.setFont(undefined, "normal");
  [["on", "Exceeding expectation"], ["margin", "Steady progress"], ["off", "Needs a boost"], ["way", "Critical attention needed"]].forEach(([k, d2]) => {
    doc.setFillColor(...fills[k]); doc.rect(14, y - 3, 5, 4, "F");
    doc.setTextColor(...inks[k]); doc.setFont(undefined, "bold"); doc.text(STATUS[k].label, 21, y);
    doc.setTextColor(90, 80, 76); doc.setFont(undefined, "normal"); doc.text("— " + d2, 58, y);
    y += 5.5;
  });
  pdfFooter(doc);
  doc.save("VMBS_Operations_Month_In_Review_SLA_" + MONTHS[mi] + "_" + yr + ".pdf");
}
function downloadRangePDF(measures, from, to, avgFn, yr) {
  const doc = new jspdf.jsPDF({ orientation: "landscape" });
  const span = MONTHS.slice(from, to + 1);
  pdfHeader(doc, "VMBS OPERATIONS DEPARTMENT — " + MONTHS[from].toUpperCase() + " – " + MONTHS[to].toUpperCase() + " " + yr + " · Period report (SLA)");
  doc.autoTable({
    startY: 30, margin: { left: 14, right: 14 },
    head: [["Key measure", "Manager", "Target", ...span, "Status (" + MONTHS[to] + ")"]],
    body: measures.map(it => { const s = stat(it.m[to], it.target);
      return [it.name, it.owner, pct(it.target, 2),
        ...span.map((_, k) => { const v = it.m[from + k]; return v === "NA" ? "N/A" : v == null ? "—" : pct(v, 0); }),
        s ? STATUS[s].label : "—"]; }),
    styles: { fontSize: 6.6, cellPadding: 1.6 },
    headStyles: { fillColor: [228, 1, 43], fontSize: 6.6 },
    columnStyles: { 0: { cellWidth: 62 } },
  });
  let y = doc.lastAutoTable.finalY + 6;
  doc.setFontSize(8); doc.setFont(undefined, "bold");
  doc.text("Division average — " + span.map((mo, k) => mo + ": " + pct(avgFn(from + k))).join("   ·   "), 14, y, { maxWidth: 260 });
  pdfFooter(doc);
  doc.save("VMBS_Ops_SLA_Monitor_" + MONTHS[from] + "-" + MONTHS[to] + "_" + yr + ".pdf");
}
function downloadCSVData(measures, from, to, label, yr) {
  const esc = s => '"' + String(s).replace(/"/g, '""') + '"';
  const lines = ["Category,Key Measure,Description,Tracker,Target %,Month,Actual %,Status"];
  measures.forEach(it => { for (let mi = from; mi <= to; mi++) {
    const a = it.m[mi], s = stat(a, it.target);
    lines.push([esc(CATFULL[it.cat]), esc(it.name), esc(it.d || ""), esc(it.owner), (it.target * 100).toFixed(2),
      MONTHS[mi] + " " + yr, a === "NA" ? "N/A" : typeof a === "number" ? (a * 100).toFixed(2) : "",
      s ? STATUS[s].label : ""].join(","));
  } });
  dl(lines.join("\n"), "VMBS_Ops_SLA_" + label + "_" + yr + ".csv", "text/csv");
}

/* ---------- main app ---------- */
function App() {

        if (ovr.targets[it.name] != null) out.target = ovr.targets[it.name];

  }, [ext, ovr, entries]);

  const owners = useMemo(() => [...new Set(measures.map(it => it.owner))].sort(), [measures]);

            {MONTHS.map((mo, i) => monthHasData(i) && <option key={mo} value={i}>{mo}</option>)}</select>
          <label className="sub">To</label>
          <select className="sel" value={repTo} onChange={e => setRepTo(+e.target.value)}>
            {MONTHS.map((mo, i) => monthHasData(i) && i >= repFrom && <option key={mo} value={i}>{mo}</option>)}</select>
        </div>)}
      {(() => {
        const from = repMode === "month" ? repM : repMode === "range" ? repFrom : 0;
        const to = repMode === "month" ? repM : repMode === "range" ? Math.max(repFrom, repTo) : cycle;
        const label = repMode === "month" ? MONTHS[repM] : MONTHS[from] + "–" + MONTHS[to];
        const c = { on: 0, margin: 0, off: 0, way: 0 };
        measures.forEach(it => { const s = stat(it.m[to], it.target); if (s) c[s]++; });
        return (
          <div className="card" style={{ marginTop: 12 }}>
            <div className="row between base"><div className="t14">{label} {yr}</div>
              <div className="num18" style={{ color: "#E4012B" }}>{pct(monthlyAvg(to))}</div></div>
            <div className="row gap8 wrap" style={{ margin: "10px 0 14px" }}>
              {Object.keys(STATUS).map(k => <span key={k} className="pill" style={{ background: STATUS[k].bg, color: STATUS[k].color }}>{c[k]} {STATUS[k].label}</span>)}
            </div>
            <button className="cta" onClick={() => safePDF(() => repMode === "month" ? downloadMonthPDF(measures, repM, monthlyAvg(repM), yr) : downloadRangePDF(measures, from, to, monthlyAvg, yr))}>
              Download PDF ({label} {yr})</button>
            <button className="cta2" onClick={() => safeCSV(() => downloadCSVData(measures, from, to, label.replace("–", "-"), yr))}>Download CSV (for Excel)</button>
            <div className="sub" style={{ marginTop: 10 }}>PDF is formatted for circulation and printing; CSV opens straight into Excel for pivoting.</div>
          </div>);
      })()}
      <div className="h2l">Status definitions</div>
      <div className="col gap8 pb8">
        {[["on", "At or above target."], ["margin", "Within 3% below target — acceptable, watch closely."],
          ["off", "3–10% below target. Written commentary required."],
          ["way", "More than 10% below target. Immediate COO notification; action plan within 5 business days."]].map(([k, d]) => (
            <div key={k} className="card row gap10" style={{ padding: 13, alignItems: "flex-start" }}>
              <Pill s={k} small /><div className="sub13" style={{ flex: 1 }}>{d}</div></div>))}
      </div>
    </div>
  );

  const Entry = (
    <div>
      <div className="card">
        <div className="t15">Enter {yr} actuals</div>
        <div className="sub13" style={{ marginTop: 4 }}>
          Enter each actual as a percentage (e.g. 96.4) or mark N/A. The Excel workbook on SharePoint remains the official entry point and source of truth — figures saved here update this app's views on this device, pending the write-back phase.
        </div>
      </div>
      <div className="h2l">Month</div>
      <div className="chips">{MONTHS.map((mo, i) => <Chip key={mo} active={entryMonth === i} onClick={() => setEntryMonth(i)}>{mo}</Chip>)}</div>
      <div className="sub" style={{ margin: "8px 4px 0" }}>
        {MONTHS[entryMonth]} {yr} actuals are due by <strong style={{ color: "#E4012B" }}>{yr === 2026 ? DEADLINES[entryMonth] : "the second Monday of the following month"}</strong>.
      </div>
      <div className="h2l">Filter</div>
      <div className="chips">
        <Chip active={!entryOwner && !entryCat} onClick={() => { setEntryOwner(null); setEntryCat(null); }}>All</Chip>
        {owners.map(o => <Chip key={o} active={entryOwner === o} onClick={() => setEntryOwner(entryOwner === o ? null : o)}>{o}</Chip>)}
      </div>
      <div className="chips" style={{ marginTop: 6 }}>
        {CATLIST.map(c => measures.some(it => it.cat === c) &&
          <Chip key={c} active={entryCat === c} onClick={() => setEntryCat(entryCat === c ? null : c)}>{CATNAME[c]}</Chip>)}
      </div>
      <div className="sub" style={{ margin: "8px 4px 0" }}>{entryList.length} measure{entryList.length === 1 ? "" : "s"} shown</div>
      {CATLIST.map(c => { const items = entryList.filter(it => it.cat === c); if (!items.length) return null;
        return (
          <div key={c}>
            <div className="h2l">{CATNAME[c]}</div>
            <div className="card" style={{ padding: "4px 14px" }}>
              {items.map((it, idx) => (
                <div key={it.name} className="row mid gap8" style={{ padding: "10px 0", borderBottom: idx < items.length - 1 ? "1px solid #F1ECE9" : "none" }}>
                  <div style={{ flex: 1, fontSize: 12.5, lineHeight: 1.3 }}>{it.name}
                    <span className="sub" style={{ display: "block", fontSize: 10.5 }}>{it.owner} · target {pct(it.target, 2)}</span></div>
                  {draft[it.name] === "NA" ? <span className="sub b">N/A</span> : (
                    <div className="row mid" style={{ gap: 3 }}>
                      <input className="numin" type="number" inputMode="decimal" min="0" max="100" step="0.01"
                        value={draft[it.name] ?? ""} placeholder="—"
                        onChange={e => setDraft({ ...draft, [it.name]: e.target.value })} />
                      <span className="sub">%</span>
                    </div>)}
                  <button className="nabtn" data-on={draft[it.name] === "NA"}
                    onClick={() => setDraft({ ...draft, [it.name]: draft[it.name] === "NA" ? "" : "NA" })}>N/A</button>
                </div>))}
            </div>
          </div>); })}
      <div className="card row mid gap8" style={{ marginTop: 16 }}>
        <div className="sub13" style={{ flex: 1 }}>Entered by</div>
        <input className="login-in" style={{ marginBottom: 0, maxWidth: 220 }} placeholder="Your name" value={enteredBy}
          onChange={e => { setEnteredBy(e.target.value); try { localStorage.setItem("vmbs_entered_by", e.target.value); } catch (err) {} }} />
      </div>
      <div style={{ position: "sticky", bottom: 86, marginTop: 12, paddingBottom: 8 }}>
        <button className="cta shadow" onClick={saveEntries}>Save {MONTHS[entryMonth]} {yr} actuals</button>
        {saveMsg && <div className="okmsg">{saveMsg}</div>}
      </div>
    </div>
  );

  const Settings = !admin ? null : (
    <SettingsScreen adminPw={adminPw} setAdminPw={p => { setAdminPw(p); ls.set("vmbs_admin_pw", p); log("Changed admin password"); }}
      measures={measures} ovr={ovr} setOvr={o => { setOvr(o); ls.set("vmbs_admin_ovr", o); }} log={log} audit={audit}
      connect={connect} loadFile={loadFile} revertSource={revertSource} ext={ext} liveMsg={liveMsg} />
  );

  const tabs = [
    ["pulse", "Pulse", "M3 12h4l3-8 4 16 3-8h4"],
    ["measures", "Measures", "M4 6h16M4 12h16M4 18h10"],
    ["history", "History", "M4 4v16h16M8 14v3M12 9v8M16 12v5M20 7v10"],
    ["report", "Report", "M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"],
    ["entry", "Entry", "M16 3l5 5L8 21H3v-5L16 3z", true],
    ["settings", "Settings", "M12 8a4 4 0 100 8 4 4 0 000-8zM19 12a7 7 0 01-.1 1.2l2 1.6-2 3.4-2.4-1a7 7 0 01-2 1.2L14 21h-4l-.5-2.6a7 7 0 01-2-1.2l-2.4 1-2-3.4 2-1.6A7 7 0 015 12a7 7 0 01.1-1.2l-2-1.6 2-3.4 2.4 1a7 7 0 012-1.2L10 3h4l.5 2.6a7 7 0 012 1.2l2.4-1 2 3.4-2 1.6c.07.4.1.8.1 1.2z", true],
  ];

  return (
    <div className="shell">
      <div className="app">
        <div className="appbar">
          <VMLogo h={26} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="brand">VM Building Society</div>
            <div className="sub" style={{ fontWeight: 500 }}>Operations SLA Monitor · Latest data: {MONTHS[cycle]} {yr}</div>
          </div>
          <span className={"srcbadge" + (ext ? " live" : "")}>{!ext ? "Built-in data" : ext.type === "graph" ? "Live · SharePoint" :
            "Workbook · " + new Date(ext.loadedAt).toLocaleDateString("en-JM", { day: "numeric", month: "short" })}</span>
          {admin ? (
            <button className="userchip" title="Sign out of admin"
              onClick={() => { try { sessionStorage.removeItem("vmbs_admin"); } catch (e) {} setAdmin(false); if (tab === "settings" || tab === "entry") setTab("pulse"); }}>A</button>
          ) : (
            <button className="loginpill" onClick={() => { setPwOpen(true); setPwTry(""); setPwErr(""); }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="4" y="11" width="16" height="9" rx="2" /><path d="M8 11V7a4 4 0 018 0v4" /></svg>
              Login
            </button>
          )}
        </div>
        {liveMsg && <div className="banner">{liveMsg}</div>}
        <div className="content">
          {tab === "pulse" && Pulse}
          {tab === "measures" && Measures}
          {tab === "history" && History}
          {tab === "report" && Report}
          {tab === "entry" && (admin ? Entry : null)}
          {tab === "settings" && Settings}
        </div>
        {pwOpen && (
          <div className="overlay" onClick={() => setPwOpen(false)}>
            <div className="modal" onClick={e => e.stopPropagation()} onKeyDown={e => { if (e.key === "Escape") setPwOpen(false); }}>
              <button className="modalx" aria-label="Close" onClick={() => setPwOpen(false)}>✕</button>
              <div className="t15" style={{ marginBottom: 4, paddingRight: 28 }}>Admin sign-in</div>
              <div className="sub13" style={{ marginBottom: 12 }}>Needed for Entry and Settings. Viewing the dashboard, history and reports stays open to everyone.</div>
              <input className="login-in" type="password" placeholder="Admin password" value={pwTry} autoFocus
                onChange={e => setPwTry(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") { if (pwTry === adminPw) { try { sessionStorage.setItem("vmbs_admin", "1"); } catch (err) {} setAdmin(true); setPwOpen(false); if (pwNext) { setTab(pwNext); setPwNext(null); } log("Signed in"); } else setPwErr("Incorrect password."); } }} />
              {pwErr && <div className="errmsg">{pwErr}</div>}
              <button className="cta" onClick={() => { if (pwTry === adminPw) { try { sessionStorage.setItem("vmbs_admin", "1"); } catch (e) {} setAdmin(true); setPwOpen(false); if (pwNext) { setTab(pwNext); setPwNext(null); } log("Signed in"); } else setPwErr("Incorrect password."); }}>Unlock</button>
              <button className="cta2" onClick={() => setPwOpen(false)}>Cancel</button>
            </div>
          </div>
        )}
        <div className="tabbar">
          {tabs.map(([id, label, icon, locked]) => (
            <button key={id} className={"tabbtn" + (tab === id ? " on" : "")}
              onClick={() => { if (locked && !admin) { setPwNext(id); setPwOpen(true); setPwTry(""); setPwErr(""); return; }
                setTab(id); window.scrollTo(0, 0); }}>
              <span className="iconwrap">
                <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={icon} /></svg>
                {locked && !admin && (
                  <svg className="tablock" width="11" height="11" viewBox="0 0 24 24" fill="#fff" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="4" y="11" width="16" height="9" rx="2" /><path d="M8 11V7a4 4 0 018 0v4" /></svg>
                )}
              </span>
              <span>{label}</span>
            </button>))}
        </div>
      </div>
    </div>
  );
}

function SettingsScreen({ adminPw, setAdminPw, measures, ovr, setOvr, log, audit, connect, loadFile, revertSource, ext, liveMsg }) {
  const [cur, setCur] = useState(""); const [n1, setN1] = useState(""); const [n2, setN2] = useState(""); const [pwMsg, setPwMsg] = useState("");
  const fileRef = React.useRef(null);
  const [nm, setNm] = useState({ name: "", owner: "", cat: "BSS", target: "99.99" });
  const owners = [...new Set(measures.map(it => it.owner))].sort();
  const changePw = () => {
    if (cur !== adminPw) return setPwMsg("Current password is incorrect.");
    if (n1.length < 6) return setPwMsg("New password must be at least 6 characters.");
    if (n1 !== n2) return setPwMsg("New passwords do not match.");
    setAdminPw(n1); setCur(""); setN1(""); setN2(""); setPwMsg("Password changed on this device.");
  };
  const renameOwner = (oldName) => {
    const nn = window.prompt("New officer name to replace '" + oldName + "':", oldName);
    if (!nn || nn.trim() === oldName) return;
    const owners2 = { ...ovr.owners };
    measures.filter(it => it.owner === oldName).forEach(it => { owners2[it.name] = nn.trim(); });
    setOvr({ ...ovr, owners: owners2 }); log("Reassigned measures from " + oldName + " to " + nn.trim());
  };
  const editMeasure = (it) => {
    const nn = window.prompt("Measure name:", it.name); if (nn == null) return;
    const no = window.prompt("Officer / manager:", it.owner); if (no == null) return;
    const nt = window.prompt("Target % (e.g. 99.99):", (it.target * 100).toFixed(2)); if (nt == null) return;
    const next = { ...ovr, renames: { ...ovr.renames }, owners: { ...ovr.owners }, targets: { ...ovr.targets } };
    if (nn.trim() && nn.trim() !== it.name) next.renames[it.name] = nn.trim();
    if (no.trim() && no.trim() !== it.owner) next.owners[it.name] = no.trim();
    const t = parseFloat(nt); if (!isNaN(t) && t > 0 && t <= 100) next.targets[it.name] = +(t / 100).toFixed(4);
    setOvr(next); log("Edited measure: " + it.name);
  };
  const retire = (it) => {
    if (!window.confirm("Retire '" + it.name + "'? It drops out of all views and reports but stays in workbook history.")) return;
    setOvr({ ...ovr, retired: [...ovr.retired, it.name] }); log("Retired measure: " + it.name);
  };
  const restore = (name) => { setOvr({ ...ovr, retired: ovr.retired.filter(r => r !== name) }); log("Restored measure: " + name); };
  const addMeasure = () => {
    if (!nm.name.trim() || !nm.owner.trim()) return;
    const t = parseFloat(nm.target);
    setOvr({ ...ovr, added: [...ovr.added, { id: "add-" + Date.now(), name: nm.name.trim(), owner: nm.owner.trim(),
      cat: nm.cat, target: isNaN(t) ? .9999 : +(t / 100).toFixed(4) }] });
    log("Added measure: " + nm.name.trim());
    setNm({ name: "", owner: "", cat: "BSS", target: "99.99" });
  };
  return (
    <div>
      <div className="card">
        <div className="t15">Data source</div>
        <div className="sub13" style={{ margin: "4px 0 10px" }}>
          {!ext ? "Running on the built-in dataset (May 2026). Load your Excel workbook straight from this device — no IT needed. SharePoint connection becomes available once GICT completes the setup guide."
            : ext.type === "graph" ? "Connected — reading the live workbook on SharePoint."
            : "Using \"" + ext.label + "\", loaded " + new Date(ext.loadedAt).toLocaleString("en-JM") + ". When the Excel file is updated each month, load it again here to refresh — one tap."}
        </div>
        <input ref={fileRef} type="file" accept=".xlsx,.xlsm" style={{ display: "none" }}
          onChange={e => { const f = e.target.files && e.target.files[0]; if (f) loadFile(f); e.target.value = ""; }} />
        <button className="cta" onClick={() => fileRef.current && fileRef.current.click()}>Load Excel workbook (from this device)</button>
        <button className="cta2" onClick={connect}>Connect to SharePoint (after GICT setup)</button>
        {ext && <button className="cta2" onClick={revertSource}>Reset to built-in dataset</button>}
        {liveMsg && <div className="sub b" style={{ marginTop: 8 }}>{liveMsg}</div>}
        <div className="sub" style={{ marginTop: 8 }}>The loaded workbook is remembered on this device until replaced. Each device loads the file once; the SharePoint connection (Phase 2) removes that step for everyone.</div>
      </div>

      <div className="h2l">Officers</div>
      <div className="card" style={{ padding: "4px 14px" }}>
        {owners.map((o, i) => (
          <div key={o} className="row mid between" style={{ padding: "10px 0", borderBottom: i < owners.length - 1 ? "1px solid #F1ECE9" : "none" }}>
            <div style={{ fontSize: 13 }}>{o}<span className="sub" style={{ display: "block", fontSize: 10.5 }}>
              {measures.filter(it => it.owner === o).length} measures</span></div>
            <button className="minibtn" onClick={() => renameOwner(o)}>Replace officer</button>
          </div>))}
      </div>

      <div className="h2l">Measures</div>
      <div className="card" style={{ padding: "4px 14px" }}>
        {measures.map((it, i) => (
          <div key={it.name} className="row mid gap8" style={{ padding: "9px 0", borderBottom: i < measures.length - 1 ? "1px solid #F1ECE9" : "none" }}>
            <div style={{ flex: 1, fontSize: 12.5, lineHeight: 1.3 }}>{it.name}
              <span className="sub" style={{ display: "block", fontSize: 10.5 }}>{it.owner} · {CATNAME[it.cat]} · target {pct(it.target, 2)}</span></div>
            <button className="minibtn" onClick={() => editMeasure(it)}>Edit</button>
            <button className="minibtn warn" onClick={() => retire(it)}>Retire</button>
          </div>))}
      </div>
      {ovr.retired.length > 0 && (<>
        <div className="h2l">Retired measures</div>
        <div className="card" style={{ padding: "4px 14px" }}>
          {ovr.retired.map((name, i) => (
            <div key={name} className="row mid between" style={{ padding: "9px 0", borderBottom: i < ovr.retired.length - 1 ? "1px solid #F1ECE9" : "none" }}>
              <div style={{ fontSize: 12.5, color: "#8A7E7A" }}>{name}</div>
              <button className="minibtn" onClick={() => restore(name)}>Restore</button>
            </div>))}
        </div></>)}

      <div className="h2l">Add a measure</div>
      <div className="card col gap8">
        <input className="login-in" placeholder="Measure name" value={nm.name} onChange={e => setNm({ ...nm, name: e.target.value })} />
        <input className="login-in" placeholder="Officer / manager" value={nm.owner} onChange={e => setNm({ ...nm, owner: e.target.value })} />
        <div className="row gap8 mid">
          <select className="sel" value={nm.cat} onChange={e => setNm({ ...nm, cat: e.target.value })}>
            {CATLIST.map(c => <option key={c} value={c}>{CATNAME[c]}</option>)}</select>
          <input className="login-in" style={{ width: 110, marginBottom: 0 }} placeholder="Target %" value={nm.target}
            onChange={e => setNm({ ...nm, target: e.target.value })} />
        </div>
        <button className="cta2" onClick={addMeasure}>Add measure</button>
        <div className="sub">New measures start with no actuals; staff enter them on the Entry tab. Add the same row to the Excel workbook so the official record matches.</div>
      </div>

      <div className="h2l">Admin password</div>
      <div className="card col gap8">
        <input className="login-in" type="password" placeholder="Current password" value={cur} onChange={e => setCur(e.target.value)} />
        <input className="login-in" type="password" placeholder="New password" value={n1} onChange={e => setN1(e.target.value)} />
        <input className="login-in" type="password" placeholder="Repeat new password" value={n2} onChange={e => setN2(e.target.value)} />
        <button className="cta2" onClick={changePw}>Change password</button>
        {pwMsg && <div className="sub b">{pwMsg}</div>}
        <div className="sub">The password is held in this app on each device, not on a server — so a change applies to the device where it's made. Treat this as pilot-level access control; Microsoft 365 sign-in replaces it when GICT connects the app.</div>
      </div>

      <div className="h2l">Audit log</div>
      <div className="card" style={{ padding: "4px 14px", maxHeight: 280, overflowY: "auto" }}>
        {audit.length === 0 && <div className="sub" style={{ padding: "10px 0" }}>No activity recorded yet on this device.</div>}
        {audit.map((a, i) => (
          <div key={i} style={{ padding: "8px 0", borderBottom: i < audit.length - 1 ? "1px solid #F1ECE9" : "none" }}>
            <div style={{ fontSize: 12 }}>{a.action}</div>
            <div className="sub" style={{ fontSize: 10.5 }}>{a.who} · {new Date(a.when).toLocaleString("en-JM")}</div>
          </div>))}
      </div>
      <div className="sub" style={{ margin: "10px 4px 20px" }}>
        Settings changes and the audit log are stored on this device until the SharePoint write-back phase. Mirror any permanent changes (officers, targets, new or retired measures) in the Excel workbook, which remains the governance record.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
